<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .deadline {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 48px;
    margin-bottom: 32px;
    text-align: center;
  }
  .deadline-label {
    font-size: 22px;
    color: var(--text-3);
    font-weight: 500;
    margin-bottom: 12px;
  }
  .deadline-date {
    font-size: 56px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -1.5px;
  }
  .deadline-date .em { color: var(--accent); }
  .deadline-note {
    margin-top: 12px;
    font-size: 20px;
    color: var(--text-2);
  }
  h2 {
    font-size: 88px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -2.5px;
    color: var(--text);
    text-align: center;
    margin-bottom: 32px;
  }
  h2 .em { color: var(--accent); }
  .url-card {
    background: var(--text);
    color: var(--surface);
    border-radius: 24px;
    padding: 36px 40px;
    text-align: center;
  }
  .url-cta {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .url {
    font-size: 30px;
    font-weight: 600;
    color: #ff8a8a;
    word-break: break-all;
    letter-spacing: -0.5px;
  }
  .secondary-cta {
    margin-top: 32px;
    text-align: center;
    font-size: 22px;
    color: var(--text-2);
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="slide">
  <div>
    <div class="badge" style="margin: 0 auto;">
      <span class="badge-dot"></span>
      신청 마감 임박
    </div>
    <div style="margin-top:48px;">
      <div class="deadline">
        <div class="deadline-label">접수 기간</div>
        <div class="deadline-date">5/6 ~ <span class="em">5/19 18:00</span></div>
        <div class="deadline-note">선정 발표 7월 말 · 지급 8월말부터</div>
      </div>
      <h2 style="margin-top:48px;"><span class="em">5분</span>만<br>투자해.</h2>
    </div>
  </div>
  <div>
    <div class="url-card">
      <div class="url-cta">청년월세 자격 5분 자가진단</div>
      <div class="url">seoul-youth-rent-checker.vercel.app</div>
    </div>
    <div class="secondary-cta">
      친구한테도 알려줘. 240만원이야.
    </div>
  </div>
  <div class="footer">
    <span></span>
    <span class="page-num">5 / 5</span>
  </div>
</div>
</body>
</html>
