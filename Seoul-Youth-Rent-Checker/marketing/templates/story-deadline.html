<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .story {
    background: var(--accent);
    color: var(--surface);
  }
  .badge {
    background: var(--surface);
    border-color: var(--surface);
    color: var(--accent);
    font-weight: 700;
    font-size: 28px;
    padding: 18px 28px;
  }
  .badge-dot {
    background: var(--accent);
  }
  .dday-block {
    margin-top: 60px;
  }
  .dday-label {
    font-size: 36px;
    color: var(--surface);
    opacity: 0.85;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .dday-num {
    font-size: 360px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -10px;
    color: var(--surface);
  }
  .dday-suffix {
    font-size: 40px;
    color: var(--surface);
    opacity: 0.9;
    font-weight: 700;
    margin-top: 16px;
  }
  .hook {
    font-size: 96px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -3px;
    color: var(--surface);
    margin-top: 60px;
  }
  .sub {
    font-size: 36px;
    color: var(--surface);
    opacity: 0.95;
    font-weight: 500;
    line-height: 1.45;
    margin-top: 32px;
  }
  /* 링크 스티커 안전 영역 */
  .link-slot {
    height: 320px;
  }
  .cta-hint {
    text-align: center;
    font-size: 32px;
    color: var(--surface);
    font-weight: 700;
    letter-spacing: -0.3px;
  }
</style>
</head>
<body>
<div class="story">
  <div>
    <div class="badge">
      <span class="badge-dot"></span>
      마감 임박
    </div>
    <div class="dday-block">
      <div class="dday-label">신청 마감까지</div>
      <div class="dday-num">D-3</div>
      <div class="dday-suffix">5/19 18:00 끝</div>
    </div>
    <div class="hook">
      5분만<br>
      투자해.
    </div>
    <div class="sub">
      놓치면 1년 더 기다려야 해.<br>
      자격부터 보자.
    </div>
  </div>
  <div>
    <div class="link-slot"></div>
    <div class="cta-hint">👆 링크 눌러 자격 5분 진단</div>
  </div>
</div>
</body>
</html>
